<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>temp tracker</title>

    <link rel="stylesheet" href="./estilos.css">
</head>

<body>

    <div class="contenedor">

        <div class="buscador">

            <input 
                type="text"
                placeholder="Ingrese nombre de la ciudad"
                spellcheck="false"
                autocomplete="off"
                id="input-ciudad"
            >

            <button onclick="obtenerclima()">
                <img src="imagenes/buscar.png">
            </button>

        </div>


        <div class="clima-info" id="clima-contenedor">

            <p class="clima-texto">
                Parcialmente nublado
            </p>


            <img 
                src="imagenes/clima-ejemplo.png" 
                class="clima-icono"
            >


            <h1 class="temp">
                22 grados
            </h1>


            <h2 class="ciudad">
                Huancayo
            </h2>



            <div class="detalles">


                <div class="col">

                    <img src="imagenes/humedad.png">

                    <div>
                        <p class="humedad">
                            50%
                        </p>

                        <p>
                            Humedad
                        </p>
                    </div>

                </div>



                <div class="col">

                    <img src="imagenes/viento.png">

                    <div>

                        <p class="viento">
                            15 km/hora
                        </p>

                        <p>
                            Viento
                        </p>

                    </div>

                </div>


            </div>


        </div>


    </div>


    <script src="./codigo.js"></script>

</body>
</html>
